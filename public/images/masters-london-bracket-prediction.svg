<svg viewBox="0 0 1160 780" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .round { font-size: 13px; font-weight: 700; fill: #111; }
    .date { font-size: 10px; fill: #999; }
    .team { font-size: 13px; fill: #555; }
    .win { font-size: 13px; font-weight: 700; fill: #111; }
    .score { font-size: 13px; fill: #999; text-anchor: end; }
    .wscore { font-size: 13px; font-weight: 700; fill: #ff4655; text-anchor: end; }
    .box { fill: #ffffff; stroke: #d8d8d8; }
    .winrow { fill: #fff2f3; }
    .line { stroke: #c8c8c8; stroke-width: 1.5; fill: none; }
  </style>
  <rect x="0" y="0" width="1160" height="780" fill="#ffffff"/>
  <text x="20" y="32" font-size="20" font-weight="800" fill="#111">Masters London 2026 · Playoff Bracket · My Picks</text>
  <text x="20" y="50" font-size="12" fill="#888">SpikeReport · predictions posted Jun 11, before the bracket starts. Hold me to all of it.</text>

  <!-- ============ UPPER QUARTERFINALS ============ -->
  <text x="20" y="68" class="round">Upper Quarterfinals</text>

  <!-- UQF1: G2 def XLG -->
  <g>
    <rect x="20" y="75" width="240" height="28" class="box winrow"/>
    <rect x="20" y="103" width="240" height="28" class="box"/>
    <text x="30" y="94" class="win">G2 Esports</text><text x="250" y="94" class="wscore">2</text>
    <text x="30" y="122" class="team">Xi Lai Gaming</text><text x="250" y="122" class="score">0</text>
    <text x="20" y="145" class="date">Jun 13</text>
  </g>
  <!-- UQF2: FUT def EDG -->
  <g>
    <rect x="20" y="175" width="240" height="28" class="box"/>
    <rect x="20" y="203" width="240" height="28" class="box winrow"/>
    <text x="30" y="194" class="team">EDward Gaming</text><text x="250" y="194" class="score">1</text>
    <text x="30" y="222" class="win">FUT Esports</text><text x="250" y="222" class="wscore">2</text>
    <text x="20" y="245" class="date">Jun 13</text>
  </g>
  <!-- UQF3: PRX def LEV -->
  <g>
    <rect x="20" y="275" width="240" height="28" class="box winrow"/>
    <rect x="20" y="303" width="240" height="28" class="box"/>
    <text x="30" y="294" class="win">Paper Rex</text><text x="250" y="294" class="wscore">2</text>
    <text x="30" y="322" class="team">LEVIATÁN</text><text x="250" y="322" class="score">0</text>
    <text x="20" y="345" class="date">Jun 12</text>
  </g>
  <!-- UQF4: VIT def TH -->
  <g>
    <rect x="20" y="375" width="240" height="28" class="box"/>
    <rect x="20" y="403" width="240" height="28" class="box winrow"/>
    <text x="30" y="394" class="team">Team Heretics</text><text x="250" y="394" class="score">1</text>
    <text x="30" y="422" class="win">Team Vitality</text><text x="250" y="422" class="wscore">2</text>
    <text x="20" y="445" class="date">Jun 12</text>
  </g>

  <!-- connectors QFs -> SFs -->
  <path class="line" d="M260 103 H290 V173 H320 M260 203 H290"/>
  <path class="line" d="M260 303 H290 V373 H320 M260 403 H290"/>

  <!-- ============ UPPER SEMIFINALS ============ -->
  <text x="320" y="138" class="round">Upper Semifinals</text>
  <g>
    <rect x="320" y="145" width="240" height="28" class="box winrow"/>
    <rect x="320" y="173" width="240" height="28" class="box"/>
    <text x="330" y="164" class="win">G2 Esports</text><text x="550" y="164" class="wscore">2</text>
    <text x="330" y="192" class="team">FUT Esports</text><text x="550" y="192" class="score">1</text>
    <text x="320" y="215" class="date">Jun 15</text>
  </g>
  <g>
    <rect x="320" y="345" width="240" height="28" class="box winrow"/>
    <rect x="320" y="373" width="240" height="28" class="box"/>
    <text x="330" y="364" class="win">Paper Rex</text><text x="550" y="364" class="wscore">2</text>
    <text x="330" y="392" class="team">Team Vitality</text><text x="550" y="392" class="score">0</text>
    <text x="320" y="415" class="date">Jun 15</text>
  </g>

  <!-- connectors SFs -> UF -->
  <path class="line" d="M560 173 H590 V273 H620 M560 373 H590"/>

  <!-- ============ UPPER FINAL ============ -->
  <text x="620" y="238" class="round">Upper Final</text>
  <g>
    <rect x="620" y="245" width="240" height="28" class="box winrow"/>
    <rect x="620" y="273" width="240" height="28" class="box"/>
    <text x="630" y="264" class="win">Paper Rex</text><text x="850" y="264" class="wscore">2</text>
    <text x="630" y="292" class="team">G2 Esports</text><text x="850" y="292" class="score">1</text>
    <text x="620" y="315" class="date">Jun 19</text>
  </g>

  <!-- connector UF -> GF and LF -> GF -->
  <path class="line" d="M860 273 H880 V323 H900"/>
  <path class="line" d="M1020 600 V351" stroke-dasharray="4 4"/>

  <!-- ============ GRAND FINAL ============ -->
  <text x="900" y="288" class="round">Grand Final</text>
  <g>
    <rect x="900" y="295" width="240" height="28" class="box winrow"/>
    <rect x="900" y="323" width="240" height="28" class="box"/>
    <text x="910" y="314" class="win">Paper Rex</text><text x="1130" y="314" class="wscore">3</text>
    <text x="910" y="342" class="team">G2 Esports</text><text x="1130" y="342" class="score">2</text>
    <text x="900" y="365" class="date">Jun 21 · bo5</text>
  </g>
  <text x="900" y="385" font-size="11" fill="#ff4655" font-weight="700">PRX win Masters London</text>

  <!-- ============ LOWER BRACKET ============ -->
  <line x1="20" y1="490" x2="1140" y2="490" stroke="#eeeeee" stroke-width="1"/>

  <text x="20" y="533" class="round">Lower Round 1</text>
  <!-- LR1A: EDG def XLG -->
  <g>
    <rect x="20" y="540" width="240" height="28" class="box"/>
    <rect x="20" y="568" width="240" height="28" class="box winrow"/>
    <text x="30" y="559" class="team">Xi Lai Gaming</text><text x="250" y="559" class="score">1</text>
    <text x="30" y="587" class="win">EDward Gaming</text><text x="250" y="587" class="wscore">2</text>
    <text x="20" y="610" class="date">Jun 14</text>
  </g>
  <!-- LR1B: LEV def TH -->
  <g>
    <rect x="20" y="660" width="240" height="28" class="box winrow"/>
    <rect x="20" y="688" width="240" height="28" class="box"/>
    <text x="30" y="679" class="win">LEVIATÁN</text><text x="250" y="679" class="wscore">2</text>
    <text x="30" y="707" class="team">Team Heretics</text><text x="250" y="707" class="score">0</text>
    <text x="20" y="730" class="date">Jun 14</text>
  </g>

  <path class="line" d="M260 582 H320"/>
  <path class="line" d="M260 688 H320"/>

  <text x="320" y="533" class="round">Lower Round 2</text>
  <!-- LR2A: VIT def EDG -->
  <g>
    <rect x="320" y="540" width="240" height="28" class="box"/>
    <rect x="320" y="568" width="240" height="28" class="box winrow"/>
    <text x="330" y="559" class="team">EDward Gaming</text><text x="550" y="559" class="score">1</text>
    <text x="330" y="587" class="win">Team Vitality</text><text x="550" y="587" class="wscore">2</text>
    <text x="320" y="610" class="date">Jun 16</text>
  </g>
  <!-- LR2B: LEV def FUT -->
  <g>
    <rect x="320" y="660" width="240" height="28" class="box winrow"/>
    <rect x="320" y="688" width="240" height="28" class="box"/>
    <text x="330" y="679" class="win">LEVIATÁN</text><text x="550" y="679" class="wscore">2</text>
    <text x="330" y="707" class="team">FUT Esports</text><text x="550" y="707" class="score">1</text>
    <text x="320" y="730" class="date">Jun 16</text>
  </g>

  <path class="line" d="M560 582 H590 V628 H620 M560 674 H590"/>

  <text x="620" y="593" class="round">Lower Round 3</text>
  <!-- LR3: VIT def LEV -->
  <g>
    <rect x="620" y="600" width="240" height="28" class="box winrow"/>
    <rect x="620" y="628" width="240" height="28" class="box"/>
    <text x="630" y="619" class="win">Team Vitality</text><text x="850" y="619" class="wscore">2</text>
    <text x="630" y="647" class="team">LEVIATÁN</text><text x="850" y="647" class="score">0</text>
    <text x="620" y="670" class="date">Jun 19</text>
  </g>

  <path class="line" d="M860 628 H900"/>

  <text x="900" y="593" class="round">Lower Final</text>
  <!-- LF: G2 def VIT -->
  <g>
    <rect x="900" y="600" width="240" height="28" class="box winrow"/>
    <rect x="900" y="628" width="240" height="28" class="box"/>
    <text x="910" y="619" class="win">G2 Esports</text><text x="1130" y="619" class="wscore">3</text>
    <text x="910" y="647" class="team">Team Vitality</text><text x="1130" y="647" class="score">1</text>
    <text x="900" y="670" class="date">Jun 20 · bo5 · winner to grand final</text>
  </g>

  <text x="20" y="765" font-size="11" fill="#aaaaaa">Upper semifinal losers drop to Lower Round 2 · Upper final loser drops to Lower Final</text>
</svg>
